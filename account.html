<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuberPulse | Личный кабинет</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0F1A;
            font-family: 'Inter', sans-serif;
            color: #E8EDF5;
        }
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0F172A, #020617);
            z-index: -2;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 2;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .nav-buttons { display: flex; gap: 12px; }
        .btn-outline {
            background: transparent;
            border: 1px solid #2A3650;
            padding: 8px 18px;
            border-radius: 40px;
            color: #CBD5E1;
            cursor: pointer;
        }
        .profile-container {
            max-width: 600px;
            margin: 60px auto;
            background: rgba(18, 25, 45, 0.6);
            border-radius: 24px;
            border: 1px solid #1F2A44;
            padding: 40px;
        }
        .order-item {
            background: #111827;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            border: 1px solid #2A3650;
        }
        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #60A5FA;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <div class="logo" onclick="location.href='index.html'"><h1>CuberPulse</h1></div>
        <div class="nav-buttons">
            <button class="btn-outline" onclick="location.href='index.html'">🏠 Главная</button>
        </div>
    </div>
    <div class="back-link" onclick="location.href='index.html'">← На главную</div>
    <div class="profile-container" id="profileContainer">
        <h2>👤 Личный кабинет</h2>
        <div id="profileContent"></div>
    </div>
</div>
<script>
    const currentUser = localStorage.getItem('currentUser');
    const profileDiv = document.getElementById('profileContent');
    
    if(!currentUser) {
        profileDiv.innerHTML = `<p style="color:#F87171;">Вы не авторизованы</p><button class="btn-outline" onclick="location.href='index.html'">Войти</button>`;
    } else {
        profileDiv.innerHTML = `
            <p><strong>📧 Email:</strong> ${currentUser}</p>
            <p><strong>📦 История заказов:</strong></p>
            <div class="order-item">
                <strong>Заказ #CP-001</strong><br>
                Статус: <span style="color:#4ADE80;">✅ Доставлен</span><br>
                Дата: 15.05.2026<br>
                Сумма: 299 $
            </div>
            <div class="order-item">
                <strong>Заказ #CP-002</strong><br>
                Статус: <span style="color:#FBBF24;">🔄 В обработке</span><br>
                Дата: 20.05.2026<br>
                Сумма: 169 $
            </div>
            <button class="btn-outline" onclick="logout()" style="margin-top:20px; width:100%;">🚪 Выйти</button>
        `;
    }
    
    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('cart');
        location.href = 'index.html';
    }
</script>
</body>
</html>
