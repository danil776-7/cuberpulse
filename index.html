<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuberPulse | Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0F1A;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #E8EDF5;
            line-height: 1.5;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0F172A, #020617);
            z-index: -2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo p {
            font-size: 12px;
            color: #6B7A8F;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2A3650;
            padding: 8px 18px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        .btn-primary {
            background: #1E2A47;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #2D3E6E;
        }

        /* Поиск и фильтры */
        .search-section {
            margin: 32px 0 24px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            background: #111827;
            border: 1px solid #2A3650;
            padding: 14px 20px;
            border-radius: 48px;
            color: white;
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
            border-color: #3B82F6;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .category-btn {
            background: #111827;
            border: 1px solid #2A3650;
            padding: 8px 20px;
            border-radius: 40px;
            color: #9AA4BF;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .category-btn.active {
            background: #3B82F6;
            border-color: #3B82F6;
            color: white;
        }

        .category-btn:hover:not(.active) {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        /* Каталог */
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 32px 0 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .catalog-title {
            font-size: 24px;
            font-weight: 600;
        }

        .product-count {
            color: #6B7A8F;
            font-size: 14px;
        }

        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 60px;
        }

        .product-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #1F2A44;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #3B82F6;
            transform: translateY(-4px);
        }

        .product-badge {
            display: inline-block;
            background: #1E2A47;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #60A5FA;
            margin-bottom: 12px;
        }

        .product-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #111827, #0F172A);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin-bottom: 16px;
            border: 1px solid #2A3650;
        }

        .product-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            color: #9AA4BF;
            font-size: 13px;
            margin: 8px 0 12px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 26px;
            font-weight: 700;
            color: #60A5FA;
            margin: 12px 0;
        }

        .btn-cart {
            width: 100%;
            background: #1E2A47;
            border: 1px solid #2A3650;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-cart:hover {
            background: #2D3E6E;
            border-color: #60A5FA;
        }

        /* КНОПКА КОРЗИНЫ С БАДЖОМ */
        .cart-icon {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1E2A47;
            padding: 8px 18px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .cart-icon:hover {
            background: #2D3E6E;
            border-color: #60A5FA;
        }

        .cart-count {
            background: #3B82F6;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
        }

        /* ВИДЖЕТ КОРЗИНЫ (дропдаун) */
        .cart-widget {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 380px;
            max-width: calc(100vw - 40px);
            background: #0F172A;
            border: 1px solid #2A3650;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .cart-widget.show {
            display: flex;
        }

        .cart-widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #111827;
            border-bottom: 1px solid #1F2A44;
        }

        .cart-widget-title {
            font-weight: 600;
            font-size: 18px;
        }

        .cart-widget-close {
            background: none;
            border: none;
            color: #9AA4BF;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .cart-widget-close:hover {
            color: #F87171;
        }

        .cart-widget-items {
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
        }

        .cart-widget-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #1F2A44;
        }

        .cart-item-img {
            width: 50px;
            height: 50px;
            background: #111827;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .cart-item-price {
            font-size: 12px;
            color: #60A5FA;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-qty-btn {
            background: #1E2A47;
            border: 1px solid #2A3650;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        .cart-item-total {
            font-weight: 600;
            color: #60A5FA;
            font-size: 14px;
            min-width: 60px;
            text-align: right;
        }

        .cart-widget-footer {
            padding: 16px 20px;
            border-top: 1px solid #1F2A44;
            background: #111827;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .cart-widget-empty {
            text-align: center;
            padding: 40px;
            color: #6B7A8F;
        }

        .btn-checkout {
            width: 100%;
            background: #3B82F6;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-checkout:hover {
            background: #2563EB;
        }

        /* Затемнение фона при открытой корзине */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="overlay" id="overlay"></div>
<div class="container">
    <div class="header">
        <div class="logo" onclick="location.href='index.html'">
            <h1>CuberPulse</h1>
            <p>professional hardware · security research</p>
        </div>
        <div class="nav-buttons">
            <button class="btn-outline" id="usdBtn">USD $</button>
            <button class="btn-outline" id="rubBtn">RUB ₽</button>
            <button class="btn-primary" onclick="location.href='account.html'">👤 Личный кабинет</button>
            <div class="cart-icon" id="cartIcon">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>

    <!-- Виджет корзины -->
    <div class="cart-widget" id="cartWidget">
        <div class="cart-widget-header">
            <span class="cart-widget-title">🛒 Корзина</span>
            <button class="cart-widget-close" id="closeCartWidget">✕</button>
        </div>
        <div id="cartWidgetItems" class="cart-widget-items">
            <div class="cart-widget-empty">Корзина пуста</div>
        </div>
        <div class="cart-widget-footer" id="cartWidgetFooter" style="display:none;">
            <div class="cart-total">
                <span>Итого:</span>
                <span id="widgetTotal">0 $</span>
            </div>
            <button class="btn-checkout" id="widgetCheckoutBtn">Оформить заказ</button>
        </div>
    </div>

    <!-- Поиск и категории -->
    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск устройств, модулей, прошивок...">
        </div>
        <div class="categories" id="categories"></div>
    </div>

    <div class="catalog-header">
        <div class="catalog-title">📦 Каталог товаров</div>
        <div class="product-count" id="productCount">Показано: 0 товаров</div>
    </div>
    <div id="catalog" class="catalog"></div>
</div>

<script>
    // ========== ТОВАРЫ ==========
    const products = [
        { id: 1, name: "Flipper Zero", price_usd: 169, desc: "Мультитул для пентеста: RFID, IR, GPIO", category: "devices", subcategory: "Устройства", img: "🐬" },
        { id: 2, name: "HackRF One", price_usd: 299, desc: "SDR-трансивер 1 МГц – 6 ГГц", category: "devices", subcategory: "Устройства", img: "📡" },
        { id: 3, name: "Proxmark3 RDV4", price_usd: 145, desc: "Клонирование RFID/NFC", category: "devices", subcategory: "Устройства", img: "💳" },
        { id: 4, name: "WiFi Deauther v3", price_usd: 49, desc: "Атака деавторизации WiFi", category: "modules", subcategory: "Модули", img: "📶" },
        { id: 5, name: "GPS/GNSS модуль", price_usd: 35, desc: "Спутниковая навигация", category: "modules", subcategory: "Модули", img: "🛰️" },
        { id: 6, name: "Широкополосная антенна", price_usd: 42, desc: "300MHz – 6GHz, SMA разъём", category: "antennas", subcategory: "Антенны", img: "📡" },
        { id: 7, name: "Кастомная прошивка", price_usd: 29, desc: "Для Flipper Zero", category: "firmware", subcategory: "Прошивки", img: "⚙️" },
        { id: 8, name: "Видеокурс по SDR", price_usd: 89, desc: "Руководство по HackRF", category: "guides", subcategory: "Руководства", img: "📚" }
    ];

    const categories = [
        { id: "all", name: "🏠 Все товары" },
        { id: "devices", name: "📟 Устройства" },
        { id: "modules", name: "🔌 Доп. модули" },
        { id: "antennas", name: "📡 Антенны" },
        { id: "firmware", name: "⚙️ Прошивки" },
        { id: "guides", name: "📚 Руководства" }
    ];

    let currentCategory = "all";
    let searchQuery = "";
    let currentCurrency = 'USD';
    let rubRate = 92;
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // Инициализация корзины (формат: [{id, quantity}])
    if(cart.length > 0 && typeof cart[0] === 'number') {
        const oldCart = [...cart];
        const quantityMap = {};
        oldCart.forEach(id => { quantityMap[id] = (quantityMap[id] || 0) + 1; });
        cart = Object.entries(quantityMap).map(([id, quantity]) => ({ id: parseInt(id), quantity }));
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    // DOM элементы
    const catalogDiv = document.getElementById('catalog');
    const categoriesDiv = document.getElementById('categories');
    const searchInput = document.getElementById('searchInput');
    const productCountSpan = document.getElementById('productCount');
    const cartCountSpan = document.getElementById('cartCount');
    const usdBtn = document.getElementById('usdBtn');
    const rubBtn = document.getElementById('rubBtn');
    const cartIcon = document.getElementById('cartIcon');
    const cartWidget = document.getElementById('cartWidget');
    const overlay = document.getElementById('overlay');
    const closeCartWidget = document.getElementById('closeCartWidget');

    // ========== ОТКРЫТИЕ/ЗАКРЫТИЕ ВИДЖЕТА ==========
    function openCartWidget() {
        cartWidget.classList.add('show');
        overlay.classList.add('show');
        renderCartWidget();
    }

    function closeCartWidgetFunc() {
        cartWidget.classList.remove('show');
        overlay.classList.remove('show');
    }

    cartIcon.addEventListener('click', (e) => {
        e.stopPropagation();
        openCartWidget();
    });

    closeCartWidget.addEventListener('click', closeCartWidgetFunc);
    overlay.addEventListener('click', closeCartWidgetFunc);

    // ========== ОТРИСОВКА ВИДЖЕТА КОРЗИНЫ ==========
    function renderCartWidget() {
        const container = document.getElementById('cartWidgetItems');
        const footer = document.getElementById('cartWidgetFooter');
        
        if(cart.length === 0) {
            container.innerHTML = '<div class="cart-widget-empty">🛒 Корзина пуста<br><br>Добавьте товары из каталога</div>';
            footer.style.display = 'none';
            return;
        }

        footer.style.display = 'block';
        
        container.innerHTML = cart.map(item => {
            const product = products.find(p => p.id === item.id);
            if(!product) return '';
            const price = getPriceInCurrency(product.price_usd);
            const itemTotal = getPriceInCurrency(product.price_usd * item.quantity);
            return `
                <div class="cart-widget-item">
                    <div class="cart-item-img">${product.img}</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${product.name}</div>
                        <div class="cart-item-price">${price.val} ${price.sym}</div>
                    </div>
                    <div class="cart-item-quantity">
                        <button class="cart-qty-btn" onclick="event.stopPropagation(); changeQuantity(${item.id}, -1)">−</button>
                        <span style="min-width: 25px; text-align: center;">${item.quantity}</span>
                        <button class="cart-qty-btn" onclick="event.stopPropagation(); changeQuantity(${item.id}, 1)">+</button>
                    </div>
                    <div class="cart-item-total">${itemTotal.val} ${itemTotal.sym}</div>
                </div>
            `;
        }).join('');

        const totalUSD = getTotalUSD();
        const total = getPriceInCurrency(totalUSD);
        document.getElementById('widgetTotal').innerHTML = `${total.val} ${total.sym}`;
    }

    // ========== КУРС ВАЛЮТ ==========
    async function fetchRubRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            rubRate = data.rates.RUB;
        } catch(e) { rubRate = 92; }
        renderCatalog();
    }

    function getPriceInCurrency(priceUSD) {
        if(currentCurrency === 'USD') return { val: priceUSD, sym: '$' };
        return { val: (priceUSD * rubRate).toFixed(2), sym: '₽' };
    }

    function getTotalUSD() {
        let total = 0;
        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if(product) total += product.price_usd * item.quantity;
        });
        return total;
    }

    // ========== ОТРИСОВКА КАТАЛОГА ==========
    function renderCategories() {
        categoriesDiv.innerHTML = categories.map(cat => `
            <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                ${cat.name}
            </button>
        `).join('');
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.dataset.cat;
                renderCategories();
                renderCatalog();
            });
        });
    }

    function getFilteredProducts() {
        let filtered = products;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        if (searchQuery.trim() !== '') {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.desc.toLowerCase().includes(query) ||
                p.subcategory.toLowerCase().includes(query)
            );
        }
        return filtered;
    }

    function renderCatalog() {
        const filtered = getFilteredProducts();
        productCountSpan.innerText = `Показано: ${filtered.length} из ${products.length} товаров`;
        
        if(filtered.length === 0) {
            catalogDiv.innerHTML = `<div style="text-align:center; padding:60px; color:#6B7A8F;">🔍 Ничего не найдено</div>`;
            return;
        }
        
        catalogDiv.innerHTML = filtered.map(p => {
            const price = getPriceInCurrency(p.price_usd);
            return `
                <div class="product-card">
                    <span class="product-badge">${p.subcategory}</span>
                    <div class="product-img">${p.img}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">${price.val} ${price.sym}</div>
                    <button class="btn-cart" onclick="event.stopPropagation(); addToCart(${p.id})">+ В корзину</button>
                </div>
            `;
        }).join('');
    }

    // ========== УПРАВЛЕНИЕ КОРЗИНОЙ ==========
    function addToCart(id) {
        const existingItem = cart.find(i => i.id === id);
        if(existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({ id: id, quantity: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCartWidget();
        showToast("✓ Товар добавлен в корзину", "#4ADE80");
    }

    window.changeQuantity = function(productId, delta) {
        const item = cart.find(i => i.id === productId);
        if(item) {
            const newQuantity = item.quantity + delta;
            if(newQuantity >= 1 && newQuantity <= 99) {
                item.quantity = newQuantity;
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                renderCartWidget();
                renderCatalog();
            } else if(newQuantity < 1) {
                removeItem(productId);
            }
        }
    };

    function removeItem(productId) {
        cart = cart.filter(i => i.id !== productId);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCartWidget();
        renderCatalog();
        if(cart.length === 0) closeCartWidgetFunc();
        showToast("Товар удален", "#F87171");
    }

    function updateCartCount() {
        const count = cart.reduce((sum, i) => sum + i.quantity, 0);
        cartCountSpan.innerText = count;
    }

    function showToast(msg, color = "#3B82F6") {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '100px';
        toast.style.right = '24px';
        toast.style.backgroundColor = '#111827';
        toast.style.borderLeft = `4px solid ${color}`;
        toast.style.padding = '12px 20px';
        toast.style.borderRadius = '12px';
        toast.style.zIndex = '2000';
        toast.style.fontSize = '14px';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function checkout() {
        if(cart.length === 0) return;
        alert(`🎉 Заказ оформлен!\n\nСумма: ${getPriceInCurrency(getTotalUSD()).val} ${getPriceInCurrency(getTotalUSD()).sym}`);
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCartWidget();
        renderCatalog();
        closeCartWidgetFunc();
    }

    // ========== ОБРАБОТЧИКИ ==========
    searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value;
        renderCatalog();
    });
    
    usdBtn.onclick = () => { currentCurrency = 'USD'; renderCatalog(); renderCartWidget(); };
    rubBtn.onclick = () => { currentCurrency = 'RUB'; renderCatalog(); renderCartWidget(); };
    
    document.getElementById('widgetCheckoutBtn').addEventListener('click', checkout);
    
    updateCartCount();
    renderCategories();
    fetchRubRate();
</script>
</body>
</html>
