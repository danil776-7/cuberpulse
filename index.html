<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuberPulse | Корзина товаров</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0A0F1A;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #E8EDF5;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0F172A, #020617);
            z-index: -2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 12px;
            color: #6B7A8F;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2A3650;
            padding: 8px 18px;
            border-radius: 40px;
            color: #CBD5E1;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        .btn-primary {
            background: #1E2A47;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #2D3E6E;
        }

        /* Корзина */
        .cart-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
            margin: 40px 0 60px;
        }

        @media (max-width: 900px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }

        .cart-items {
            background: rgba(18, 25, 45, 0.6);
            border-radius: 24px;
            border: 1px solid #1F2A44;
            overflow: hidden;
        }

        .cart-header {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 50px;
            padding: 16px 20px;
            background: #111827;
            border-bottom: 1px solid #1F2A44;
            font-size: 13px;
            color: #9AA4BF;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 50px;
            padding: 20px;
            border-bottom: 1px solid #1F2A44;
            align-items: center;
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            background: #0F172A;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .cart-item-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .cart-item-price {
            color: #60A5FA;
            font-weight: 600;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            background: #1E2A47;
            border: 1px solid #2A3650;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }

        .quantity-btn:hover {
            background: #2D3E6E;
            border-color: #3B82F6;
        }

        .quantity-input {
            width: 50px;
            text-align: center;
            background: #111827;
            border: 1px solid #2A3650;
            border-radius: 8px;
            padding: 6px;
            color: white;
        }

        .item-total {
            font-weight: 700;
            color: #60A5FA;
        }

        .remove-item {
            background: none;
            border: none;
            color: #F87171;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .remove-item:hover {
            color: #EF4444;
            transform: scale(1.1);
        }

        /* Сводка заказа */
        .cart-summary {
            background: rgba(18, 25, 45, 0.6);
            border-radius: 24px;
            border: 1px solid #1F2A44;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-summary h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1F2A44;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            font-size: 20px;
            font-weight: 700;
            color: #60A5FA;
            border-top: 2px solid #3B82F6;
            margin-top: 12px;
        }

        .promo-section {
            margin: 20px 0;
        }

        .promo-input {
            display: flex;
            gap: 10px;
        }

        .promo-input input {
            flex: 1;
            background: #111827;
            border: 1px solid #2A3650;
            padding: 12px;
            border-radius: 40px;
            color: white;
        }

        .btn-checkout {
            width: 100%;
            background: #3B82F6;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 20px;
        }

        .btn-checkout:hover {
            background: #2563EB;
        }

        .empty-cart {
            text-align: center;
            padding: 60px;
            color: #9AA4BF;
        }

        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #60A5FA;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>CuberPulse</h1>
            <p>professional hardware · security research</p>
        </div>
        <div class="nav-buttons">
            <button class="btn-outline" id="usdBtn">USD $</button>
            <button class="btn-outline" id="rubBtn">RUB ₽</button>
            <button class="btn-primary" id="accountBtn">👤 Личный кабинет</button>
        </div>
    </div>

    <a href="#" onclick="history.back(); return false;" class="back-link">← Вернуться к покупкам</a>

    <h1 style="margin: 20px 0;">🛒 Корзина</h1>

    <div class="cart-container">
        <div id="cartItemsContainer" class="cart-items"></div>
        <div id="summaryContainer" class="cart-summary"></div>
    </div>
</div>

<script>
    // ========== ТОВАРЫ ==========
    const products = [
        { id: 1, name: "Flipper Zero", price_usd: 169, desc: "Мультитул для пентеста", category: "devices", img: "🐬" },
        { id: 2, name: "HackRF One", price_usd: 299, desc: "SDR-трансивер", category: "devices", img: "📡" },
        { id: 3, name: "Proxmark3 RDV4", price_usd: 145, desc: "Клонирование RFID/NFC", category: "devices", img: "💳" },
        { id: 4, name: "WiFi Deauther v3", price_usd: 49, desc: "Атака деавторизации", category: "modules", img: "📶" },
        { id: 5, name: "GPS/GNSS модуль", price_usd: 35, desc: "Спутниковая навигация", category: "modules", img: "🛰️" },
        { id: 6, name: "Широкополосная антенна", price_usd: 42, desc: "300MHz – 6GHz", category: "antennas", img: "📡" },
        { id: 7, name: "Кастомная прошивка", price_usd: 29, desc: "Для Flipper Zero", category: "firmware", img: "⚙️" }
    ];

    // Промокоды
    const promocodes = {
        "WELCOME10": { discount: 10, type: "percent" },
        "CUBER20": { discount: 20, type: "percent" },
        "FREESHIP": { discount: 5, type: "percent" }
    };

    let currentCurrency = 'USD';
    let rubRate = 92;
    let cart = JSON.parse(localStorage.getItem('cart')) || []; // массив объектов {id, quantity}
    let appliedPromo = null;

    // Инициализация корзины (если старый формат)
    if(cart.length > 0 && typeof cart[0] === 'number') {
        const oldCart = [...cart];
        const quantityMap = {};
        oldCart.forEach(id => { quantityMap[id] = (quantityMap[id] || 0) + 1; });
        cart = Object.entries(quantityMap).map(([id, quantity]) => ({ id: parseInt(id), quantity }));
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    // ========== КУРС ВАЛЮТ ==========
    async function fetchRubRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            rubRate = data.rates.RUB;
        } catch(e) { rubRate = 92; }
        renderCart();
    }

    function getPriceInCurrency(priceUSD) {
        if(currentCurrency === 'USD') return { val: priceUSD, sym: '$' };
        return { val: (priceUSD * rubRate).toFixed(2), sym: '₽' };
    }

    // ========== РАСЧЕТ СУММЫ ==========
    function getSubtotal() {
        let subtotalUSD = 0;
        cart.forEach(item => {
            const product = products.find(p => p.id === item.id);
            if(product) subtotalUSD += product.price_usd * item.quantity;
        });
        return subtotalUSD;
    }

    function getDiscount(subtotalUSD) {
        if(!appliedPromo) return 0;
        const promo = promocodes[appliedPromo];
        if(promo.type === 'percent') {
            return subtotalUSD * (promo.discount / 100);
        }
        return 0;
    }

    function getTotalUSD() {
        const subtotal = getSubtotal();
        const discount = getDiscount(subtotal);
        return subtotal - discount;
    }

    // ========== ОТРИСОВКА КОРЗИНЫ ==========
    function renderCart() {
        const container = document.getElementById('cartItemsContainer');
        const summaryContainer = document.getElementById('summaryContainer');
        
        if(cart.length === 0) {
            container.innerHTML = `<div class="empty-cart">🛒 Корзина пуста<br><br><a href="/" style="color:#60A5FA;">Перейти в каталог</a></div>`;
            summaryContainer.innerHTML = '';
            return;
        }

        // Отрисовка товаров
        container.innerHTML = `
            <div class="cart-header">
                <div>Товар</div>
                <div>Название</div>
                <div>Цена</div>
                <div>Количество</div>
                <div></div>
            </div>
            ${cart.map(item => {
                const product = products.find(p => p.id === item.id);
                if(!product) return '';
                const price = getPriceInCurrency(product.price_usd);
                const itemTotal = getPriceInCurrency(product.price_usd * item.quantity);
                return `
                    <div class="cart-item" data-id="${item.id}">
                        <div class="cart-item-img">${product.img}</div>
                        <div>
                            <div class="cart-item-title">${product.name}</div>
                            <div style="font-size:12px; color:#9AA4BF;">${product.desc}</div>
                        </div>
                        <div class="cart-item-price">${price.val} ${price.sym}</div>
                        <div class="quantity-control">
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">−</button>
                            <input type="number" class="quantity-input" value="${item.quantity}" min="1" max="99" onchange="setQuantity(${item.id}, this.value)">
                            <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="item-total">${itemTotal.val} ${itemTotal.sym}</div>
                        <button class="remove-item" onclick="removeItem(${item.id})">✕</button>
                    </div>
                `;
            }).join('')}
        `;

        // Отрисовка сводки
        const subtotalUSD = getSubtotal();
        const discountUSD = getDiscount(subtotalUSD);
        const totalUSD = getTotalUSD();
        
        const subtotal = getPriceInCurrency(subtotalUSD);
        const discount = getPriceInCurrency(discountUSD);
        const total = getPriceInCurrency(totalUSD);

        summaryContainer.innerHTML = `
            <h3>Сводка заказа</h3>
            <div class="summary-row">
                <span>Товары (${cart.reduce((sum, i) => sum + i.quantity, 0)} шт.)</span>
                <span>${subtotal.val} ${subtotal.sym}</span>
            </div>
            ${appliedPromo ? `
                <div class="summary-row">
                    <span>Скидка (${promocodes[appliedPromo].discount}%)</span>
                    <span style="color:#4ADE80;">-${discount.val} ${discount.sym}</span>
                </div>
            ` : ''}
            <div class="summary-total">
                <span>Итого</span>
                <span>${total.val} ${total.sym}</span>
            </div>
            <div class="promo-section">
                <div class="promo-input">
                    <input type="text" id="promoCode" placeholder="Промокод" ${appliedPromo ? 'disabled' : ''}>
                    <button class="btn-outline" id="applyPromoBtn" ${appliedPromo ? 'disabled' : ''}>Применить</button>
                </div>
                ${appliedPromo ? `<div style="margin-top:8px; color:#4ADE80; font-size:13px;">✓ Промокод ${appliedPromo} активирован <button onclick="removePromo()" style="background:none; border:none; color:#F87171; cursor:pointer;">✕</button></div>` : ''}
            </div>
            <button class="btn-primary btn-checkout" onclick="checkout()">Перейти к оформлению</button>
        `;

        // Обработчик промокода
        document.getElementById('applyPromoBtn')?.addEventListener('click', applyPromo);
    }

    // ========== УПРАВЛЕНИЕ КОРЗИНОЙ ==========
    window.changeQuantity = function(productId, delta) {
        const item = cart.find(i => i.id === productId);
        if(item) {
            const newQuantity = item.quantity + delta;
            if(newQuantity >= 1 && newQuantity <= 99) {
                item.quantity = newQuantity;
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                updateCartCount();
            }
        }
    };

    window.setQuantity = function(productId, value) {
        const newQuantity = parseInt(value);
        if(!isNaN(newQuantity) && newQuantity >= 1 && newQuantity <= 99) {
            const item = cart.find(i => i.id === productId);
            if(item) {
                item.quantity = newQuantity;
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                updateCartCount();
            }
        } else {
            renderCart();
        }
    };

    window.removeItem = function(productId) {
        cart = cart.filter(i => i.id !== productId);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
        updateCartCount();
        showToast("Товар удален из корзины", "#F87171");
    };

    function applyPromo() {
        const input = document.getElementById('promoCode');
        const code = input.value.trim().toUpperCase();
        if(promocodes[code]) {
            appliedPromo = code;
            showToast(`Промокод ${code} активирован! Скидка ${promocodes[code].discount}%`, "#4ADE80");
            renderCart();
        } else {
            showToast("Неверный промокод", "#F87171");
        }
    }

    window.removePromo = function() {
        appliedPromo = null;
        renderCart();
        showToast("Промокод отменен", "#9AA4BF");
    };

    function updateCartCount() {
        const count = cart.reduce((sum, i) => sum + i.quantity, 0);
        const cartCountSpan = document.getElementById('cartCount');
        if(cartCountSpan) cartCountSpan.innerText = count;
        localStorage.setItem('cartCount', count);
    }

    function showToast(msg, color = "#3B82F6") {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '24px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#111827';
        toast.style.border = `1px solid ${color}`;
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '2000';
        toast.style.fontSize = '14px';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function checkout() {
        if(cart.length === 0) {
            showToast("Корзина пуста", "#F87171");
            return;
        }
        alert(`🎉 Оформление заказа!\n\nСумма: ${getPriceInCurrency(getTotalUSD()).val} ${getPriceInCurrency(getTotalUSD()).sym}\n\nВ следующей версии добавим оплату и доставку.`);
    }

    // ========== ВАЛЮТА ==========
    document.getElementById('usdBtn')?.addEventListener('click', () => {
        currentCurrency = 'USD';
        renderCart();
    });
    document.getElementById('rubBtn')?.addEventListener('click', () => {
        currentCurrency = 'RUB';
        renderCart();
    });

    document.getElementById('accountBtn')?.addEventListener('click', () => {
        alert("Личный кабинет будет доступен в следующем обновлении");
    });

    // ========== ЗАПУСК ==========
    fetchRubRate();
</script>
</body>
</html>
