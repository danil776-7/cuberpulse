<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CuberPulse | Professional hardware for security research</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0F1C;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #E6EDF3;
            line-height: 1.5;
        }

        /* профессиональный градиентный фон */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0F172A, #020617);
            z-index: -2;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 2;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 600;
            background: linear-gradient(135deg, #A5F3FC, #38BDF8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .logo p {
            font-size: 12px;
            color: #7E8A9B;
            margin-top: 4px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2D3A5E;
            padding: 8px 18px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-outline:hover {
            border-color: #38BDF8;
            color: #38BDF8;
            background: rgba(56, 189, 248, 0.05);
        }

        .btn-primary {
            background: #1E2A47;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #2D3E6E;
        }

        /* карточки товаров */
        .section-title {
            font-size: 28px;
            font-weight: 600;
            margin: 48px 0 24px 0;
            letter-spacing: -0.4px;
        }

        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            margin: 32px 0 60px;
        }

        .product-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #1F2A44;
            border-radius: 24px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .product-card:hover {
            border-color: #38BDF8;
            transform: translateY(-4px);
        }

        .product-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            color: #9CA3AF;
            font-size: 14px;
            margin: 12px 0 16px;
            line-height: 1.4;
        }

        .price {
            font-size: 26px;
            font-weight: 700;
            color: #A5F3FC;
            margin: 16px 0;
        }

        .btn-cart {
            width: 100%;
            background: #1E2A47;
            border: 1px solid #2D3A5E;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn-cart:hover {
            background: #2D3E6E;
            border-color: #38BDF8;
        }

        /* корзина плавающая */
        .cart-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111827;
            border: 1px solid #38BDF8;
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* модальное окно (личный кабинет / корзина) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0F172A;
            max-width: 480px;
            width: 90%;
            border-radius: 32px;
            border: 1px solid #2D3A5E;
            padding: 28px;
            color: #E6EDF3;
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1E2A47;
            border: 1px solid #2D3A5E;
            border-radius: 32px;
            color: white;
            font-size: 14px;
        }

        .modal-content button {
            width: 100%;
            margin-top: 12px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #9CA3AF;
        }

        hr {
            margin: 20px 0;
            border-color: #1F2A44;
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>CuberPulse</h1>
            <p>hardware security & research</p>
        </div>
        <div class="nav-buttons">
            <button class="btn-outline" id="usdBtn">USD $</button>
            <button class="btn-outline" id="rubBtn">RUB ₽</button>
            <button class="btn-primary" id="accountBtn">Личный кабинет</button>
        </div>
    </div>

    <div class="section-title">📡 Доступное оборудование</div>
    <div id="catalog" class="catalog"></div>
</div>

<div class="cart-fab" id="cartFab">
    🛒 Корзина <span id="cartCount">0</span>
</div>

<!-- Модалка личного кабинета (вход/регистрация) -->
<div id="accountModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <h2>Аккаунт CuberPulse</h2>
        <div id="authView">
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn-primary" id="registerBtn">Регистрация</button>
            <p style="font-size:13px; margin-top:12px;">После регистрации придёт код на почту</p>
            <hr>
            <input type="text" id="verifyCode" placeholder="Код из письма">
            <button class="btn-primary" id="verifyBtn">Войти по коду</button>
        </div>
        <div id="profileView" style="display:none;">
            <p>✅ <strong id="userEmailDisplay"></strong></p>
            <p>📦 Статус последнего заказа: <span id="orderStatus">Загрузка...</span></p>
            <button id="logoutBtn" class="btn-outline" style="width:100%;">Выйти</button>
        </div>
    </div>
</div>

<!-- Модалка корзины -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeCartModal">&times;</span>
        <h2>🛒 Ваша корзина</h2>
        <div id="cartItemsList">Корзина пуста</div>
        <button id="checkoutBtn" class="btn-primary" style="margin-top:16px;">Оформить заказ</button>
    </div>
</div>

<script>
    // ---------- ТОВАРЫ (без смайликов) ----------
    const products = [
        { id: 1, name: "Flipper Zero", price_usd: 169, desc: "Многофункциональный инструмент для пентеста и исследования протоколов" },
        { id: 2, name: "HackRF One", price_usd: 299, desc: "SDR-трансивер 1 МГц – 6 ГГц для радиотестирования" },
        { id: 3, name: "WiFi Deauther", price_usd: 45, desc: "Анализ и тестирование Wi-Fi сетей, модуль атак" },
        { id: 4, name: "Proxmark3", price_usd: 120, desc: "Исследование RFID/NFC, клонирование и эмуляция" }
    ];

    let currentCurrency = 'USD';
    let rubRate = 90; // загрузится позже
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let authToken = localStorage.getItem('authToken');
    let currentUserEmail = localStorage.getItem('userEmail');

    // Элементы DOM
    const catalogDiv = document.getElementById('catalog');
    const cartCountSpan = document.getElementById('cartCount');
    const usdBtn = document.getElementById('usdBtn');
    const rubBtn = document.getElementById('rubBtn');
    const accountBtn = document.getElementById('accountBtn');
    const cartFab = document.getElementById('cartFab');
    const accountModal = document.getElementById('accountModal');
    const cartModal = document.getElementById('cartModal');
    const closeModalBtn = document.getElementById('closeModal');
    const closeCartModal = document.getElementById('closeCartModal');
    const authView = document.getElementById('authView');
    const profileView = document.getElementById('profileView');
    const userEmailDisplay = document.getElementById('userEmailDisplay');
    const orderStatusSpan = document.getElementById('orderStatus');
    const logoutBtn = document.getElementById('logoutBtn');
    const registerBtn = document.getElementById('registerBtn');
    const verifyBtn = document.getElementById('verifyBtn');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const cartItemsList = document.getElementById('cartItemsList');

    // --- загрузка курса RUB ---
    async function fetchRubRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            rubRate = data.rates.RUB;
        } catch(e) { rubRate = 92; }
        renderCatalog();
    }

    function getPrice(product) {
        if(currentCurrency === 'USD') return { val: product.price_usd, sym: '$' };
        return { val: (product.price_usd * rubRate).toFixed(2), sym: '₽' };
    }

    function renderCatalog() {
        catalogDiv.innerHTML = products.map(p => {
            const price = getPrice(p);
            return `
                <div class="product-card">
                    <div class="product-title">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="price">${price.val} ${price.sym}</div>
                    <button class="btn-cart" data-id="${p.id}">Добавить в корзину</button>
                </div>
            `;
        }).join('');

        // вешаем события на кнопки "Добавить"
        document.querySelectorAll('.btn-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                addToCart(id);
            });
        });
        updateCartUI();
    }

    function addToCart(id) {
        cart.push(id);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        showTemporaryMessage("Товар добавлен в корзину");
    }

    function updateCartUI() {
        cartCountSpan.innerText = cart.length;
        if(cartItemsList) {
            if(cart.length === 0) cartItemsList.innerText = "Корзина пуста";
            else {
                const itemsMap = {};
                cart.forEach(id => { itemsMap[id] = (itemsMap[id] || 0) + 1; });
                cartItemsList.innerHTML = Object.entries(itemsMap).map(([id, qty]) => {
                    const prod = products.find(p => p.id == id);
                    return `<div>${prod.name} × ${qty} — ${getPrice(prod).val} ${getPrice(prod).sym}</div>`;
                }).join('');
            }
        }
    }

    function showTemporaryMessage(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '90px';
        toast.style.right = '24px';
        toast.style.backgroundColor = '#1E2A47';
        toast.style.border = '1px solid #38BDF8';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '1000';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // --- эмуляция бэкенда (почта / токен) для демо (позже замените на реальный API)
    function registerUser(email, password) {
        if(!email.includes('@')) { alert("Введите корректный email"); return; }
        const fakeCode = Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem(`pending_${email}`, fakeCode);
        alert(`Демо-режим: ваш код подтверждения ${fakeCode} (в реальном проекте придёт на почту)`);
    }

    function verifyCode(email, code) {
        const savedCode = localStorage.getItem(`pending_${email}`);
        if(savedCode && savedCode == code) {
            authToken = `demo_token_${Date.now()}`;
            currentUserEmail = email;
            localStorage.setItem('authToken', authToken);
            localStorage.setItem('userEmail', email);
            updateAuthUI(true);
            alert("Успешный вход! Теперь вы можете добавлять товары в корзину и отслеживать заказы.");
            return true;
        } else {
            alert("Неверный код");
            return false;
        }
    }

    function updateAuthUI(isLoggedIn) {
        if(isLoggedIn && currentUserEmail) {
            authView.style.display = 'none';
            profileView.style.display = 'block';
            userEmailDisplay.innerText = currentUserEmail;
            // статус заказа: если есть корзина или прошлые заказы
            if(cart.length > 0) orderStatusSpan.innerText = "Собирается";
            else orderStatusSpan.innerText = "Нет активных заказов";
        } else {
            authView.style.display = 'block';
            profileView.style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('verifyCode').value = '';
        }
    }

    function logout() {
        authToken = null;
        currentUserEmail = null;
        localStorage.removeItem('authToken');
        localStorage.removeItem('userEmail');
        updateAuthUI(false);
        showTemporaryMessage("Вы вышли из аккаунта");
    }

    // обработчики модалок
    accountBtn.onclick = () => {
        if(authToken && currentUserEmail) updateAuthUI(true);
        else updateAuthUI(false);
        accountModal.style.display = 'flex';
    };
    cartFab.onclick = () => {
        updateCartUI();
        cartModal.style.display = 'flex';
    };
    function closeModals() { accountModal.style.display = 'none'; cartModal.style.display = 'none'; }
    closeModalBtn.onclick = closeModals;
    closeCartModal.onclick = closeModals;
    window.onclick = (e) => { if(e.target === accountModal || e.target === cartModal) closeModals(); };

    registerBtn.onclick = () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        if(email && pass) registerUser(email, pass);
        else alert("Заполните email и пароль");
    };
    verifyBtn.onclick = () => {
        const email = document.getElementById('loginEmail').value;
        const code = document.getElementById('verifyCode').value;
        if(email && code) verifyCode(email, code);
        else alert("Введите email и код");
    };
    logoutBtn.onclick = logout;

    checkoutBtn.onclick = () => {
        if(!authToken) { alert("Войдите в аккаунт, чтобы оформить заказ"); return; }
        if(cart.length === 0) { alert("Корзина пуста"); return; }
        alert("Заказ оформлен! Статус можно отследить в личном кабинете.");
        // имитация заказа
        orderStatusSpan.innerText = "Оформлен, ожидает отправки";
        localStorage.setItem('cart', JSON.stringify([]));
        cart = [];
        updateCartUI();
        cartModal.style.display = 'none';
    };

    usdBtn.onclick = () => { currentCurrency = 'USD'; renderCatalog(); updateCartUI(); };
    rubBtn.onclick = () => { currentCurrency = 'RUB'; renderCatalog(); updateCartUI(); };

    // инициализация
    if(authToken && currentUserEmail) updateAuthUI(true);
    fetchRubRate();
    renderCatalog();
    updateCartUI();
</script>
</body>
</html>
