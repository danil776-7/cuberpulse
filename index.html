<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuberPulse | Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0F1A;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #E8EDF5;
            line-height: 1.5;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0F172A, #020617);
            z-index: -2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo p {
            font-size: 12px;
            color: #6B7A8F;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2A3650;
            padding: 8px 18px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        .btn-primary {
            background: #1E2A47;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #2D3E6E;
        }

        /* Поиск и фильтры */
        .search-section {
            margin: 32px 0 24px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            background: #111827;
            border: 1px solid #2A3650;
            padding: 14px 20px;
            border-radius: 48px;
            color: white;
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
            border-color: #3B82F6;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .category-btn {
            background: #111827;
            border: 1px solid #2A3650;
            padding: 8px 20px;
            border-radius: 40px;
            color: #9AA4BF;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .category-btn.active {
            background: #3B82F6;
            border-color: #3B82F6;
            color: white;
        }

        .category-btn:hover:not(.active) {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        /* Каталог */
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 32px 0 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .catalog-title {
            font-size: 24px;
            font-weight: 600;
        }

        .product-count {
            color: #6B7A8F;
            font-size: 14px;
        }

        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 60px;
        }

        .product-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #1F2A44;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #3B82F6;
            transform: translateY(-4px);
        }

        .product-badge {
            display: inline-block;
            background: #1E2A47;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #60A5FA;
            margin-bottom: 12px;
        }

        .product-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #111827, #0F172A);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin-bottom: 16px;
            border: 1px solid #2A3650;
        }

        .product-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            color: #9AA4BF;
            font-size: 13px;
            margin: 8px 0 12px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 26px;
            font-weight: 700;
            color: #60A5FA;
            margin: 12px 0;
        }

        .btn-cart {
            width: 100%;
            background: #1E2A47;
            border: 1px solid #2A3650;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-cart:hover {
            background: #2D3E6E;
            border-color: #60A5FA;
        }

        /* Корзина плавающая */
        .cart-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111827;
            border: 1px solid #3B82F6;
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .cart-fab:hover {
            border-color: #60A5FA;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <div class="logo" onclick="location.href='index.html'">
            <h1>CuberPulse</h1>
            <p>professional hardware · security research</p>
        </div>
        <div class="nav-buttons">
            <button class="btn-outline" id="usdBtn">USD $</button>
            <button class="btn-outline" id="rubBtn">RUB ₽</button>
            <button class="btn-primary" onclick="location.href='account.html'">👤 Личный кабинет</button>
        </div>
    </div>

    <!-- Поиск и категории -->
    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск устройств, модулей, прошивок...">
        </div>
        <div class="categories" id="categories"></div>
    </div>

    <div class="catalog-header">
        <div class="catalog-title">📦 Каталог товаров</div>
        <div class="product-count" id="productCount">Показано: 0 товаров</div>
    </div>
    <div id="catalog" class="catalog"></div>
</div>

<div class="cart-fab" id="cartFab">
    🛒 Корзина · <span id="cartCount">0</span>
</div>

<script>
    // ========== ТОВАРЫ С КАТЕГОРИЯМИ ==========
    const products = [
        // Устройства
        { id: 1, name: "Flipper Zero", price_usd: 169, desc: "Мультитул для пентеста: RFID, IR, GPIO, iButton", category: "devices", subcategory: "Устройства", img: "🐬", stock: true },
        { id: 2, name: "HackRF One", price_usd: 299, desc: "SDR-трансивер 1 МГц – 6 ГГц для радиотестирования", category: "devices", subcategory: "Устройства", img: "📡", stock: true },
        { id: 3, name: "Proxmark3 RDV4", price_usd: 145, desc: "Клонирование RFID/NFC, исследование бесконтактных карт", category: "devices", subcategory: "Устройства", img: "💳", stock: true },
        
        // Модули
        { id: 4, name: "WiFi Deauther v3", price_usd: 49, desc: "Атака деавторизации, мониторинг WiFi сетей", category: "modules", subcategory: "Модули", img: "📶", stock: true },
        { id: 5, name: "GPS/GNSS модуль", price_usd: 35, desc: "Спутниковая навигация для HackRF/Flipper", category: "modules", subcategory: "Модули", img: "🛰️", stock: true },
        { id: 6, name: "NRF24L01+ модуль", price_usd: 12, desc: "2.4GHz беспроводной модуль для Flipper Zero", category: "modules", subcategory: "Модули", img: "📻", stock: true },
        { id: 7, name: "CC1101 модуль", price_usd: 15, desc: "Суб-ГГц трансивер для расширения диапазонов", category: "modules", subcategory: "Модули", img: "🔘", stock: true },
        
        // Антенны
        { id: 8, name: "Широкополосная антенна", price_usd: 42, desc: "300MHz – 6GHz, SMA разъём", category: "antennas", subcategory: "Антенны", img: "📡", stock: true },
        { id: 9, name: "Направленная антенна 2.4GHz", price_usd: 38, desc: "Усиление 12dBi для WiFi атак", category: "antennas", subcategory: "Антенны", img: "📡", stock: true },
        { id: 10, name: "HF/VHF антенна", price_usd: 55, desc: "Для работы с HackRF в низкочастотном диапазоне", category: "antennas", subcategory: "Антенны", img: "📡", stock: true },
        
        // Прошивки
        { id: 11, name: "Кастомная прошивка Flipper", price_usd: 29, desc: "Расширенный функционал, новые протоколы", category: "firmware", subcategory: "Прошивки", img: "⚙️", stock: true },
        { id: 12, name: "Marauder для Flipper", price_usd: 24, desc: "WiFi атаки, Evil Portal, Beacon Spam", category: "firmware", subcategory: "Прошивки", img: "⚙️", stock: true },
        
        // Руководства
        { id: 13, name: "Видеокурс по SDR", price_usd: 89, desc: "Руководство по HackRF One: от новичка до эксперта", category: "guides", subcategory: "Руководства", img: "📚", stock: true },
        { id: 14, name: "Руководство по пентесту", price_usd: 49, desc: "Методики тестирования с Flipper Zero", category: "guides", subcategory: "Руководства", img: "📘", stock: true }
    ];

    const categories = [
        { id: "all", name: "🏠 Все товары" },
        { id: "devices", name: "📟 Устройства" },
        { id: "modules", name: "🔌 Доп. модули" },
        { id: "antennas", name: "📡 Антенны" },
        { id: "firmware", name: "⚙️ Прошивки" },
        { id: "guides", name: "📚 Руководства" }
    ];

    let currentCategory = "all";
    let searchQuery = "";
    let currentCurrency = 'USD';
    let rubRate = 92;
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // Инициализация корзины
    if(cart.length > 0 && typeof cart[0] === 'number') {
        const oldCart = [...cart];
        const quantityMap = {};
        oldCart.forEach(id => { quantityMap[id] = (quantityMap[id] || 0) + 1; });
        cart = Object.entries(quantityMap).map(([id, quantity]) => ({ id: parseInt(id), quantity }));
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    // DOM элементы
    const catalogDiv = document.getElementById('catalog');
    const categoriesDiv = document.getElementById('categories');
    const searchInput = document.getElementById('searchInput');
    const productCountSpan = document.getElementById('productCount');
    const cartCountSpan = document.getElementById('cartCount');
    const usdBtn = document.getElementById('usdBtn');
    const rubBtn = document.getElementById('rubBtn');
    const cartFab = document.getElementById('cartFab');

    // ========== ОТРИСОВКА КАТЕГОРИЙ ==========
    function renderCategories() {
        categoriesDiv.innerHTML = categories.map(cat => `
            <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                ${cat.name}
            </button>
        `).join('');
        
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.dataset.cat;
                renderCategories();
                renderCatalog();
            });
        });
    }

    // ========== ФИЛЬТРАЦИЯ ==========
    function getFilteredProducts() {
        let filtered = products;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        if (searchQuery.trim() !== '') {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.desc.toLowerCase().includes(query) ||
                p.subcategory.toLowerCase().includes(query)
            );
        }
        return filtered;
    }

    // ========== КУРС ВАЛЮТ ==========
    async function fetchRubRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            rubRate = data.rates.RUB;
        } catch(e) { rubRate = 92; }
        renderCatalog();
    }

    function getPrice(product) {
        if(currentCurrency === 'USD') return { val: product.price_usd, sym: '$' };
        return { val: (product.price_usd * rubRate).toFixed(2), sym: '₽' };
    }

    function renderCatalog() {
        const filtered = getFilteredProducts();
        productCountSpan.innerText = `Показано: ${filtered.length} из ${products.length} товаров`;
        
        if(filtered.length === 0) {
            catalogDiv.innerHTML = `<div style="text-align:center; padding:60px; color:#6B7A8F;">🔍 Ничего не найдено. Попробуйте изменить поиск или категорию</div>`;
            return;
        }
        
        catalogDiv.innerHTML = filtered.map(p => {
            const price = getPrice(p);
            return `
                <div class="product-card" onclick="goToProduct(${p.id})">
                    <span class="product-badge">${p.subcategory}</span>
                    <div class="product-img">${p.img}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">${price.val} ${price.sym}</div>
                    <button class="btn-cart" onclick="event.stopPropagation(); addToCart(${p.id})">+ В корзину</button>
                </div>
            `;
        }).join('');
    }

    function addToCart(id) {
        const existingItem = cart.find(i => i.id === id);
        if(existingItem) {
            existingItem.quantity++;
        } else {
            cart.push({ id: id, quantity: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        showToast("✓ Товар добавлен в корзину", "#4ADE80");
    }

    function updateCartCount() {
        const count = cart.reduce((sum, i) => sum + i.quantity, 0);
        cartCountSpan.innerText = count;
    }

    function showToast(msg, color = "#3B82F6") {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '100px';
        toast.style.right = '24px';
        toast.style.backgroundColor = '#111827';
        toast.style.borderLeft = `4px solid ${color}`;
        toast.style.padding = '12px 20px';
        toast.style.borderRadius = '12px';
        toast.style.zIndex = '2000';
        toast.style.fontSize = '14px';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function goToProduct(id) {
        localStorage.setItem('selectedProduct', id);
        window.location.href = 'product.html';
    }

    // ========== ОБРАБОТЧИКИ ==========
    searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value;
        renderCatalog();
    });
    
    usdBtn.onclick = () => { currentCurrency = 'USD'; renderCatalog(); };
    rubBtn.onclick = () => { currentCurrency = 'RUB'; renderCatalog(); };
    cartFab.onclick = () => { window.location.href = 'cart.html'; };
    
    updateCartCount();
    renderCategories();
    fetchRubRate();
</script>
</body>
</html>
