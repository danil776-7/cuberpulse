<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuberPulse | Профессиональное оборудование</title>
    <!-- EmailJS для отправки кода на почту -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0F1A;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #E8EDF5;
            line-height: 1.5;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0F172A, #020617);
            z-index: -2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .logo p {
            font-size: 12px;
            color: #6B7A8F;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2A3650;
            padding: 8px 18px;
            border-radius: 40px;
            color: #CBD5E1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        .btn-primary {
            background: #1E2A47;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #2D3E6E;
        }

        /* Поиск и фильтры */
        .search-section {
            margin: 32px 0 24px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            background: #111827;
            border: 1px solid #2A3650;
            padding: 14px 20px;
            border-radius: 48px;
            color: white;
            font-size: 15px;
        }

        .search-input:focus {
            outline: none;
            border-color: #3B82F6;
        }

        .filters-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: #111827;
            border: 1px solid #2A3650;
            padding: 8px 20px;
            border-radius: 40px;
            color: #9AA4BF;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .category-btn.active {
            background: #3B82F6;
            border-color: #3B82F6;
            color: white;
        }

        .sort-select {
            background: #111827;
            border: 1px solid #2A3650;
            padding: 8px 16px;
            border-radius: 40px;
            color: #CBD5E1;
            cursor: pointer;
        }

        /* Каталог */
        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 32px 0 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .catalog-title {
            font-size: 24px;
            font-weight: 600;
        }

        .product-count {
            color: #6B7A8F;
            font-size: 14px;
        }

        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 60px;
        }

        .product-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #1F2A44;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            border-color: #3B82F6;
            transform: translateY(-4px);
        }

        .wishlist-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .wishlist-btn.active {
            color: #F87171;
        }

        .product-badge {
            display: inline-block;
            background: #1E2A47;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #60A5FA;
            margin-bottom: 12px;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 8px 0;
            font-size: 13px;
        }

        .stars {
            color: #FBBF24;
            letter-spacing: 2px;
        }

        .product-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #111827, #0F172A);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin-bottom: 16px;
            border: 1px solid #2A3650;
        }

        .product-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            color: #9AA4BF;
            font-size: 13px;
            margin: 8px 0 12px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 26px;
            font-weight: 700;
            color: #60A5FA;
            margin: 12px 0;
        }

        .btn-cart {
            width: 100%;
            background: #1E2A47;
            border: 1px solid #2A3650;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .btn-cart:hover {
            background: #2D3E6E;
            border-color: #60A5FA;
        }

        /* Виджет корзины */
        .cart-icon {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1E2A47;
            padding: 8px 18px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .cart-icon:hover {
            background: #2D3E6E;
        }

        .cart-count {
            background: #3B82F6;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .cart-widget {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 400px;
            max-width: calc(100vw - 40px);
            background: #0F172A;
            border: 1px solid #2A3650;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .cart-widget.show {
            display: flex;
        }

        .cart-widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #111827;
            border-bottom: 1px solid #1F2A44;
        }

        .cart-widget-title {
            font-weight: 600;
            font-size: 18px;
        }

        .cart-widget-close {
            background: none;
            border: none;
            color: #9AA4BF;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-widget-items {
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
        }

        .cart-widget-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #1F2A44;
        }

        .cart-item-img {
            width: 50px;
            height: 50px;
            background: #111827;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .cart-item-price {
            font-size: 12px;
            color: #60A5FA;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-qty-btn {
            background: #1E2A47;
            border: 1px solid #2A3650;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        .cart-widget-footer {
            padding: 16px 20px;
            border-top: 1px solid #1F2A44;
            background: #111827;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .btn-checkout {
            width: 100%;
            background: #3B82F6;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        /* Модалка входа */
        .auth-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            max-width: 90vw;
            background: #0F172A;
            border: 1px solid #2A3650;
            border-radius: 24px;
            padding: 32px;
            z-index: 1100;
            display: none;
        }

        .auth-modal.show {
            display: block;
        }

        .auth-modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111827;
            border: 1px solid #2A3650;
            border-radius: 40px;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111827;
            border-left: 4px solid #3B82F6;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 2000;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="overlay" id="overlay"></div>
<div class="container">
    <div class="header">
        <div class="logo" onclick="location.reload()">
            <h1>CuberPulse</h1>
            <p>professional hardware · security research</p>
        </div>
        <div class="nav-buttons">
            <button class="btn-outline" id="usdBtn">USD $</button>
            <button class="btn-outline" id="rubBtn">RUB ₽</button>
            <button class="btn-outline" id="wishlistBtn">❤️ Избранное (<span id="wishlistCount">0</span>)</button>
            <button class="btn-primary" id="accountBtn">👤 Войти</button>
            <div class="cart-icon" id="cartIcon">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>

    <!-- Виджет корзины -->
    <div class="cart-widget" id="cartWidget">
        <div class="cart-widget-header">
            <span class="cart-widget-title">🛒 Корзина</span>
            <button class="cart-widget-close" id="closeCartWidget">✕</button>
        </div>
        <div id="cartWidgetItems" class="cart-widget-items">
            <div style="text-align:center; padding:40px;">Корзина пуста</div>
        </div>
        <div class="cart-widget-footer" id="cartWidgetFooter" style="display:none;">
            <div class="cart-total"><span>Итого:</span><span id="widgetTotal">0 $</span></div>
            <button class="btn-checkout" id="widgetCheckoutBtn">Оформить заказ</button>
        </div>
    </div>

    <!-- Модалка входа/регистрации -->
    <div class="auth-modal" id="authModal">
        <h2>🔐 Вход / Регистрация</h2>
        <input type="email" id="authEmail" placeholder="Email">
        <input type="text" id="authCode" placeholder="Код из письма">
        <button class="btn-primary" id="sendCodeBtn" style="width:100%; margin-top:10px;">📧 Отправить код</button>
        <button class="btn-outline" id="loginBtn" style="width:100%; margin-top:10px;">✅ Войти по коду</button>
        <hr style="margin: 20px 0; border-color:#1F2A44;">
        <div id="authStatus" style="font-size:13px; color:#60A5FA;"></div>
    </div>

    <!-- Поиск и фильтры -->
    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск устройств, модулей, прошивок...">
        </div>
        <div class="filters-row">
            <div class="categories" id="categories"></div>
            <select id="sortSelect" class="sort-select">
                <option value="default">По умолчанию</option>
                <option value="price_asc">Цена: по возрастанию</option>
                <option value="price_desc">Цена: по убыванию</option>
                <option value="rating">По популярности</option>
            </select>
        </div>
    </div>

    <div class="catalog-header">
        <div class="catalog-title">📦 Каталог товаров</div>
        <div class="product-count" id="productCount">Показано: 0 товаров</div>
    </div>
    <div id="catalog" class="catalog"></div>
</div>

<script>
    // Инициализация EmailJS (замените на свои данные)
    emailjs.init("YOUR_PUBLIC_KEY"); // Зарегистрируйтесь на emailjs.com и получите ключ

    // ========== ТОВАРЫ С РЕЙТИНГАМИ ==========
    const products = [
        { id: 1, name: "Flipper Zero", price_usd: 169, desc: "Мультитул для пентеста: RFID, IR, GPIO, iButton", category: "devices", subcategory: "Устройства", img: "🐬", rating: 4.8, reviews: 156 },
        { id: 2, name: "HackRF One", price_usd: 299, desc: "SDR-трансивер 1 МГц – 6 ГГц", category: "devices", subcategory: "Устройства", img: "📡", rating: 4.9, reviews: 89 },
        { id: 3, name: "Proxmark3 RDV4", price_usd: 145, desc: "Клонирование RFID/NFC", category: "devices", subcategory: "Устройства", img: "💳", rating: 4.7, reviews: 67 },
        { id: 4, name: "WiFi Deauther v3", price_usd: 49, desc: "Атака деавторизации WiFi", category: "modules", subcategory: "Модули", img: "📶", rating: 4.6, reviews: 234 },
        { id: 5, name: "GPS/GNSS модуль", price_usd: 35, desc: "Спутниковая навигация", category: "modules", subcategory: "Модули", img: "🛰️", rating: 4.5, reviews: 45 },
        { id: 6, name: "Широкополосная антенна", price_usd: 42, desc: "300MHz – 6GHz", category: "antennas", subcategory: "Антенны", img: "📡", rating: 4.8, reviews: 32 },
        { id: 7, name: "Кастомная прошивка", price_usd: 29, desc: "Для Flipper Zero", category: "firmware", subcategory: "Прошивки", img: "⚙️", rating: 4.9, reviews: 78 },
        { id: 8, name: "Видеокурс по SDR", price_usd: 89, desc: "Руководство по HackRF", category: "guides", subcategory: "Руководства", img: "📚", rating: 4.7, reviews: 123 }
    ];

    const categories = [
        { id: "all", name: "🏠 Все товары" },
        { id: "devices", name: "📟 Устройства" },
        { id: "modules", name: "🔌 Модули" },
        { id: "antennas", name: "📡 Антенны" },
        { id: "firmware", name: "⚙️ Прошивки" },
        { id: "guides", name: "📚 Руководства" }
    ];

    // ========== ПЕРЕМЕННЫЕ ==========
    let currentCategory = "all";
    let searchQuery = "";
    let currentCurrency = 'USD';
    let rubRate = 92;
    let sortType = "default";
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    let currentUser = localStorage.getItem('currentUser');

    // Инициализация корзины
    if(cart.length > 0 && typeof cart[0] === 'number') {
        const oldCart = [...cart];
        const quantityMap = {};
        oldCart.forEach(id => { quantityMap[id] = (quantityMap[id] || 0) + 1; });
        cart = Object.entries(quantityMap).map(([id, quantity]) => ({ id: parseInt(id), quantity }));
        localStorage.setItem('cart', JSON.stringify(cart));
    }

    // DOM элементы
    const catalogDiv = document.getElementById('catalog');
    const categoriesDiv = document.getElementById('categories');
    const searchInput = document.getElementById('searchInput');
    const productCountSpan = document.getElementById('productCount');
    const cartCountSpan = document.getElementById('cartCount');
    const wishlistCountSpan = document.getElementById('wishlistCount');
    const usdBtn = document.getElementById('usdBtn');
    const rubBtn = document.getElementById('rubBtn');
    const sortSelect = document.getElementById('sortSelect');
    const cartIcon = document.getElementById('cartIcon');
    const cartWidget = document.getElementById('cartWidget');
    const overlay = document.getElementById('overlay');
    const closeCartWidget = document.getElementById('closeCartWidget');
    const accountBtn = document.getElementById('accountBtn');
    const authModal = document.getElementById('authModal');
    const wishlistBtn = document.getElementById('wishlistBtn');

    // ========== ОТПРАВКА КОДА НА ПОЧТУ (EmailJS) ==========
    async function sendCodeToEmail(email, code) {
        try {
            // Раскомментируйте для реальной отправки
            /*
            await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                to_email: email,
                code: code,
                from_name: "CuberPulse"
            });
            */
            console.log(`Код для ${email}: ${code}`);
            showToast(`📧 Код отправлен на ${email} (демо: ${code})`, "#4ADE80");
            return true;
        } catch(e) {
            showToast("Ошибка отправки. Код: " + code, "#F87171");
            return false;
        }
    }

    // ========== ВАЛИДАЦИЯ ПАРОЛЯ ==========
    function validatePassword(password) {
        const latinOnly = /^[A-Za-z0-9_\-\.@]+$/;
        const hasDigit = /\d/;
        if(!latinOnly.test(password)) return "Только латиница";
        if(password.length < 8) return "Минимум 8 символов";
        if(!hasDigit.test(password)) return "Нужна хотя бы одна цифра";
        return null;
    }

    // ========== РЕГИСТРАЦИЯ И ВХОД ==========
    async function registerUser(email, password) {
        const error = validatePassword(password);
        if(error) { showToast(error, "#F87171"); return false; }
        
        const code = Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem(`pending_${email}`, code);
        localStorage.setItem(`pending_pass_${email}`, password);
        await sendCodeToEmail(email, code);
        document.getElementById('authStatus').innerHTML = `Код отправлен на ${email}`;
        return true;
    }

    function loginUser(email, code) {
        const savedCode = localStorage.getItem(`pending_${email}`);
        if(savedCode && savedCode == code) {
            currentUser = email;
            localStorage.setItem('currentUser', email);
            document.getElementById('authStatus').innerHTML = "✅ Вход выполнен!";
            showToast(`Добро пожаловать, ${email}!`, "#4ADE80");
            authModal.classList.remove('show');
            overlay.classList.remove('show');
            accountBtn.innerHTML = `👤 ${email.split('@')[0]}`;
            updateAuthUI();
            return true;
        }
        showToast("❌ Неверный код", "#F87171");
        return false;
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        accountBtn.innerHTML = "👤 Войти";
        showToast("Вы вышли из аккаунта", "#9AA4BF");
    }

    function updateAuthUI() {
        if(currentUser) {
            accountBtn.innerHTML = `👤 ${currentUser.split('@')[0]}`;
        } else {
            accountBtn.innerHTML = "👤 Войти";
        }
    }

    // ========== ОТКРЫТИЕ/ЗАКРЫТИЕ ВИДЖЕТОВ ==========
    function openCartWidget() {
        cartWidget.classList.add('show');
        overlay.classList.add('show');
        renderCartWidget();
    }

    function closeCartWidgetFunc() {
        cartWidget.classList.remove('show');
        overlay.classList.remove('show');
    }

    cartIcon.addEventListener('click', (e) => { e.stopPropagation(); openCartWidget(); });
    closeCartWidget.addEventListener('click', closeCartWidgetFunc);
    overlay.addEventListener('click', closeCartWidgetFunc);

    accountBtn.addEventListener('click', () => {
        if(currentUser) {
            if(confirm("Выйти из аккаунта?")) logout();
        } else {
            authModal.classList.add('show');
            overlay.classList.add('show');
        }
    });

    document.getElementById('sendCodeBtn').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const password = prompt("Придумайте пароль (латиница, 8+ символов, цифры):");
        if(password) await registerUser(email, password);
    };
    document.getElementById('loginBtn').onclick = () => {
        const email = document.getElementById('authEmail').value;
        const code = document.getElementById('authCode').value;
        loginUser(email, code);
    };

    wishlistBtn.onclick = () => {
        if(wishlist.length === 0) {
            showToast("Избранное пусто", "#9AA4BF");
            return;
        }
        const wishlistNames = wishlist.map(id => products.find(p => p.id == id)?.name).filter(Boolean);
        showToast(`❤️ Избранное: ${wishlistNames.join(', ')}`, "#60A5FA");
    };

    // ========== КУРС ВАЛЮТ ==========
    async function fetchRubRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            rubRate = data.rates.RUB;
        } catch(e) { rubRate = 92; }
        renderCatalog();
    }

    function getPriceInCurrency(priceUSD) {
        if(currentCurrency === 'USD') return { val: priceUSD, sym: '$' };
        return { val: (priceUSD * rubRate).toFixed(2), sym: '₽' };
    }

    // ========== ОТРИСОВКА ==========
    function renderCategories() {
        categoriesDiv.innerHTML = categories.map(cat => `
            <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                ${cat.name}
            </button>
        `).join('');
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategory = btn.dataset.cat;
                renderCategories();
                renderCatalog();
            });
        });
    }

    function getFilteredAndSortedProducts() {
        let filtered = products;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        if (searchQuery.trim() !== '') {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
        }
        if (sortType === 'price_asc') filtered.sort((a,b) => a.price_usd - b.price_usd);
        if (sortType === 'price_desc') filtered.sort((a,b) => b.price_usd - a.price_usd);
        if (sortType === 'rating') filtered.sort((a,b) => b.rating - a.rating);
        return filtered;
    }

    function renderCatalog() {
        const filtered = getFilteredAndSortedProducts();
        productCountSpan.innerText = `Показано: ${filtered.length} из ${products.length}`;
        if(filtered.length === 0) {
            catalogDiv.innerHTML = `<div style="text-align:center; padding:60px;">🔍 Ничего не найдено</div>`;
            return;
        }
        catalogDiv.innerHTML = filtered.map(p => {
            const price = getPriceInCurrency(p.price_usd);
            const stars = '★'.repeat(Math.floor(p.rating)) + '☆'.repeat(5-Math.floor(p.rating));
            const isInWishlist = wishlist.includes(p.id);
            return `
                <div class="product-card">
                    <button class="wishlist-btn ${isInWishlist ? 'active' : ''}" onclick="event.stopPropagation(); toggleWishlist(${p.id})">${isInWishlist ? '❤️' : '🤍'}</button>
                    <span class="product-badge">${p.subcategory}</span>
                    <div class="product-img">${p.img}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-rating"><span class="stars">${stars}</span> ${p.rating} (${p.reviews})</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">${price.val} ${price.sym}</div>
                    <button class="btn-cart" onclick="event.stopPropagation(); addToCart(${p.id})">+ В корзину</button>
                </div>
            `;
        }).join('');
    }

    function renderCartWidget() {
        const container = document.getElementById('cartWidgetItems');
        const footer = document.getElementById('cartWidgetFooter');
        if(cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">🛒 Корзина пуста</div>';
            footer.style.display = 'none';
            return;
        }
        footer.style.display = 'block';
        let totalUSD = 0;
        container.innerHTML = cart.map(item => {
            const product = products.find(p => p.id === item.id);
            if(!product) return '';
            totalUSD += product.price_usd * item.quantity;
            const price = getPriceInCurrency(product.price_usd);
            const itemTotal = getPriceInCurrency(product.price_usd * item.quantity);
            return `
                <div class="cart-widget-item">
                    <div class="cart-item-img">${product.img}</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${product.name}</div>
                        <div class="cart-item-price">${price.val} ${price.sym}</div>
                    </div>
                    <div class="cart-item-quantity">
                        <button class="cart-qty-btn" onclick="changeQuantity(${item.id}, -1)">−</button>
                        <span style="min-width:25px;text-align:center;">${item.quantity}</span>
                        <button class="cart-qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                    </div>
                    <div class="cart-item-total">${itemTotal.val} ${itemTotal.sym}</div>
                </div>
            `;
        }).join('');
        const total = getPriceInCurrency(totalUSD);
        document.getElementById('widgetTotal').innerHTML = `${total.val} ${total.sym}`;
    }

    // ========== УПРАВЛЕНИЕ ==========
    function addToCart(id) {
        const item = cart.find(i => i.id === id);
        if(item) item.quantity++;
        else cart.push({ id, quantity: 1 });
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCartWidget();
        showToast("✓ Добавлено в корзину", "#4ADE80");
    }

    window.changeQuantity = function(id, delta) {
        const item = cart.find(i => i.id === id);
        if(item) {
            item.quantity += delta;
            if(item.quantity < 1) cart = cart.filter(i => i.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCartWidget();
            renderCatalog();
        }
    };

    function toggleWishlist(id) {
        if(wishlist.includes(id)) wishlist = wishlist.filter(i => i !== id);
        else wishlist.push(id);
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        wishlistCountSpan.innerText = wishlist.length;
        renderCatalog();
        showToast(wishlist.includes(id) ? "Добавлено в избранное" : "Удалено из избранного", "#60A5FA");
    }

    function updateCartCount() {
        const count = cart.reduce((s,i) => s + i.quantity, 0);
        cartCountSpan.innerText = count;
    }

    function showToast(msg, color) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = color;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function checkout() {
        if(cart.length === 0) { showToast("Корзина пуста", "#F87171"); return; }
        if(!currentUser) { showToast("Войдите в аккаунт для оформления", "#F87171"); return; }
        alert(`🎉 Заказ оформлен!\nСумма: ${getPriceInCurrency(cart.reduce((s,i) => s + (products.find(p=>p.id===i.id)?.price_usd||0)*i.quantity,0)).val} ${getPriceInCurrency(0).sym}\nСтатус можно отслеживать в личном кабинете.`);
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCartWidget();
        renderCatalog();
        closeCartWidgetFunc();
    }

    // ========== СОБЫТИЯ ==========
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderCatalog(); });
    sortSelect.addEventListener('change', () => { sortType = sortSelect.value; renderCatalog(); });
    usdBtn.onclick = () => { currentCurrency = 'USD'; renderCatalog(); renderCartWidget(); };
    rubBtn.onclick = () => { currentCurrency = 'RUB'; renderCatalog(); renderCartWidget(); };
    document.getElementById('widgetCheckoutBtn').onclick = checkout;

    updateCartCount();
    wishlistCountSpan.innerText = wishlist.length;
    renderCategories();
    fetchRubRate();
    updateAuthUI();

    // Закрытие модалки по клику на оверлей
    document.querySelectorAll('.overlay').forEach(el => {
        el.addEventListener('click', () => {
            authModal.classList.remove('show');
            cartWidget.classList.remove('show');
            overlay.classList.remove('show');
        });
    });
</script>
</body>
</html>
