<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuberPulse | Магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0F;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #FFFFFF;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #FFFFFF, #6C63FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 40px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            border-color: #6C63FF;
            color: #6C63FF;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6C63FF, #4A42D0);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* Поиск */
        .search-input {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            margin: 30px 0 20px;
        }

        /* Категории */
        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .category-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
        }

        .category-btn.active {
            background: #6C63FF;
            border-color: #6C63FF;
            color: white;
        }

        /* Сортировка */
        .sort-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            margin-bottom: 20px;
        }

        /* Каталог */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin: 30px 0;
        }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #6C63FF;
        }

        .wishlist-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 50%;
        }

        .wishlist-btn.active {
            color: #FF4D4D;
        }

        .product-img {
            font-size: 64px;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #6C63FF;
            margin: 12px 0;
        }

        .btn-cart {
            width: 100%;
            background: linear-gradient(135deg, #6C63FF, #4A42D0);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* Кнопка корзины */
        .cart-icon {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(108, 99, 255, 0.2);
            padding: 8px 18px;
            border-radius: 40px;
        }

        .cart-count {
            background: #FF4D4D;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
        }

        /* Модалка корзины */
        .cart-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            max-width: 90vw;
            background: #111118;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            z-index: 1001;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .cart-modal.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            padding: 16px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .cart-item-img {
            font-size: 32px;
            width: 50px;
            text-align: center;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-qty-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .btn-checkout {
            width: 100%;
            background: linear-gradient(135deg, #6C63FF, #4A42D0);
            border: none;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .close-cart {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 24px;
            cursor: pointer;
        }

        /* Оверлей */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .overlay.show {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #111118;
            border-left: 4px solid #6C63FF;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1100;
        }
    </style>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
    <div class="header">
        <div class="logo" onclick="location.reload()">
            <h1>CuberPulse</h1>
        </div>
        <div class="nav-buttons">
            <button class="btn-outline" id="usdBtn">USD $</button>
            <button class="btn-outline" id="rubBtn">RUB ₽</button>
            <button class="btn-outline" id="wishlistBtn">❤️ <span id="wishlistCount">0</span></button>
            <div class="cart-icon" id="cartIcon">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск...">

    <div class="categories" id="categories"></div>
    
    <select id="sortSelect" class="sort-select">
        <option value="default">По умолчанию</option>
        <option value="price_asc">Цена ↑</option>
        <option value="price_desc">Цена ↓</option>
    </select>

    <div id="catalog" class="catalog"></div>
</div>

<!-- Модалка корзины -->
<div class="cart-modal" id="cartModal">
    <div class="cart-header">
        <span style="font-weight:600;">🛒 Корзина</span>
        <button class="close-cart" id="closeCartBtn">✕</button>
    </div>
    <div id="cartItemsList" class="cart-items">
        <div style="text-align:center; padding:40px;">Корзина пуста</div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
        <div class="cart-total">
            <span>Итого:</span>
            <span id="cartTotal">0 $</span>
        </div>
        <button class="btn-checkout" id="checkoutBtn">Оформить заказ</button>
    </div>
</div>

<script>
    // ========== ТОВАРЫ ==========
    const products = [
        { id: 1, name: "Flipper Zero", price_usd: 169, category: "devices", img: "🐬" },
        { id: 2, name: "HackRF One", price_usd: 299, category: "devices", img: "📡" },
        { id: 3, name: "Proxmark3", price_usd: 145, category: "devices", img: "💳" },
        { id: 4, name: "WiFi Deauther", price_usd: 49, category: "modules", img: "📶" },
        { id: 5, name: "GPS модуль", price_usd: 35, category: "modules", img: "🛰️" },
        { id: 6, name: "Антенна 6GHz", price_usd: 42, category: "antennas", img: "📡" },
        { id: 7, name: "Кастом прошивка", price_usd: 29, category: "firmware", img: "⚙️" }
    ];

    const categories = [
        { id: "all", name: "Все" },
        { id: "devices", name: "Устройства" },
        { id: "modules", name: "Модули" },
        { id: "antennas", name: "Антенны" },
        { id: "firmware", name: "Прошивки" }
    ];

    // ========== ПЕРЕМЕННЫЕ ==========
    let currentCategory = "all";
    let searchQuery = "";
    let currentCurrency = 'USD';
    let rubRate = 92;
    let sortType = "default";
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

    // DOM элементы
    const catalogDiv = document.getElementById('catalog');
    const categoriesDiv = document.getElementById('categories');
    const searchInput = document.getElementById('searchInput');
    const cartCountSpan = document.getElementById('cartCount');
    const wishlistCountSpan = document.getElementById('wishlistCount');
    const cartIcon = document.getElementById('cartIcon');
    const cartModal = document.getElementById('cartModal');
    const overlay = document.getElementById('overlay');
    const closeCartBtn = document.getElementById('closeCartBtn');

    // ========== ФУНКЦИИ КОРЗИНЫ ==========
    function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartCountSpan.innerText = count;
    }

    function updateWishlistCount() {
        wishlistCountSpan.innerText = wishlist.length;
    }

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
    }

    function saveWishlist() {
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        updateWishlistCount();
    }

    function addToCart(id) {
        const existing = cart.find(item => item.id === id);
        if(existing) {
            existing.quantity++;
        } else {
            cart.push({ id: id, quantity: 1 });
        }
        saveCart();
        renderCatalog();
        showToast("✓ Добавлено в корзину", "#4ADE80");
    }

    function removeFromCart(id) {
        cart = cart.filter(item => item.id !== id);
        saveCart();
        renderCartModal();
        renderCatalog();
        showToast("✗ Удалено из корзины", "#F87171");
    }

    function changeQuantity(id, delta) {
        const item = cart.find(i => i.id === id);
        if(item) {
            item.quantity += delta;
            if(item.quantity <= 0) {
                cart = cart.filter(i => i.id !== id);
            }
            saveCart();
            renderCartModal();
            renderCatalog();
        }
    }

    function toggleWishlist(id) {
        if(wishlist.includes(id)) {
            wishlist = wishlist.filter(i => i !== id);
            showToast("Удалено из избранного", "#9AA4BF");
        } else {
            wishlist.push(id);
            showToast("Добавлено в избранное", "#6C63FF");
        }
        saveWishlist();
        renderCatalog();
    }

    // ========== КУРС ВАЛЮТ ==========
    async function fetchRubRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await res.json();
            rubRate = data.rates.RUB;
        } catch(e) { rubRate = 92; }
        renderCatalog();
    }

    function getPrice(priceUSD) {
        if(currentCurrency === 'USD') return { val: priceUSD, sym: '$' };
        return { val: (priceUSD * rubRate).toFixed(2), sym: '₽' };
    }

    // ========== ФИЛЬТРАЦИЯ И СОРТИРОВКА ==========
    function getFilteredProducts() {
        let filtered = products;
        if(currentCategory !== 'all') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        if(searchQuery) {
            filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
        }
        if(sortType === 'price_asc') filtered.sort((a,b) => a.price_usd - b.price_usd);
        if(sortType === 'price_desc') filtered.sort((a,b) => b.price_usd - a.price_usd);
        return filtered;
    }

    function renderCatalog() {
        const filtered = getFilteredProducts();
        if(filtered.length === 0) {
            catalogDiv.innerHTML = '<div style="text-align:center; padding:60px;">Ничего не найдено</div>';
            return;
        }
        catalogDiv.innerHTML = filtered.map(p => {
            const price = getPrice(p.price_usd);
            const inWishlist = wishlist.includes(p.id);
            const inCart = cart.find(i => i.id === p.id);
            return `
                <div class="product-card">
                    <button class="wishlist-btn ${inWishlist ? 'active' : ''}" onclick="toggleWishlist(${p.id})">${inWishlist ? '❤️' : '🤍'}</button>
                    <div class="product-img">${p.img}</div>
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${price.val} ${price.sym}</div>
                    <button class="btn-cart" onclick="addToCart(${p.id})">${inCart ? '✓ В корзине' : '+ В корзину'}</button>
                </div>
            `;
        }).join('');
    }

    // ========== ОТРИСОВКА КОРЗИНЫ В МОДАЛКЕ ==========
    function renderCartModal() {
        const container = document.getElementById('cartItemsList');
        const footer = document.getElementById('cartFooter');
        
        if(cart.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">🛒 Корзина пуста</div>';
            footer.style.display = 'none';
            return;
        }
        
        footer.style.display = 'block';
        let totalUSD = 0;
        
        container.innerHTML = cart.map(item => {
            const product = products.find(p => p.id === item.id);
            if(!product) return '';
            totalUSD += product.price_usd * item.quantity;
            const price = getPrice(product.price_usd);
            const itemTotal = getPrice(product.price_usd * item.quantity);
            return `
                <div class="cart-item">
                    <div class="cart-item-img">${product.img}</div>
                    <div class="cart-item-info">
                        <div class="cart-item-name">${product.name}</div>
                        <div>${price.val} ${price.sym}</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="cart-qty-btn" onclick="changeQuantity(${item.id}, -1)">−</button>
                        <span style="min-width:30px;text-align:center;">${item.quantity}</span>
                        <button class="cart-qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        <button class="cart-qty-btn" onclick="removeFromCart(${item.id})" style="background:#FF4D4D20;">✕</button>
                    </div>
                    <div style="min-width:60px;text-align:right;color:#6C63FF;">${itemTotal.val} ${itemTotal.sym}</div>
                </div>
            `;
        }).join('');
        
        const total = getPrice(totalUSD);
        document.getElementById('cartTotal').innerHTML = `${total.val} ${total.sym}`;
    }

    // ========== МОДАЛКИ ==========
    function openCartModal() {
        renderCartModal();
        cartModal.classList.add('show');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeCartModal() {
        cartModal.classList.remove('show');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
    }

    cartIcon.onclick = () => openCartModal();
    closeCartBtn.onclick = () => closeCartModal();
    overlay.onclick = () => closeCartModal();

    // ========== ОФОРМЛЕНИЕ ==========
    function checkout() {
        if(cart.length === 0) {
            showToast("Корзина пуста", "#F87171");
            return;
        }
        const totalUSD = cart.reduce((sum, item) => {
            const p = products.find(pr => pr.id === item.id);
            return sum + (p ? p.price_usd * item.quantity : 0);
        }, 0);
        const total = getPrice(totalUSD);
        alert(`✅ Заказ оформлен!\nСумма: ${total.val} ${total.sym}\nСпасибо за покупку!`);
        cart = [];
        saveCart();
        closeCartModal();
        renderCatalog();
    }

    document.getElementById('checkoutBtn').onclick = checkout;

    // ========== ФИЛЬТРЫ ==========
    function renderCategories() {
        categoriesDiv.innerHTML = categories.map(cat => `
            <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" data-cat="${cat.id}">
                ${cat.name}
            </button>
        `).join('');
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.onclick = () => {
                currentCategory = btn.dataset.cat;
                renderCategories();
                renderCatalog();
            };
        });
    }

    function showToast(msg, color) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = color;
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ========== СОБЫТИЯ ==========
    searchInput.oninput = () => {
        searchQuery = searchInput.value;
        renderCatalog();
    };
    
    document.getElementById('sortSelect').onchange = (e) => {
        sortType = e.target.value;
        renderCatalog();
    };
    
    document.getElementById('usdBtn').onclick = () => {
        currentCurrency = 'USD';
        renderCatalog();
        renderCartModal();
    };
    
    document.getElementById('rubBtn').onclick = () => {
        currentCurrency = 'RUB';
        renderCatalog();
        renderCartModal();
    };
    
    document.getElementById('wishlistBtn').onclick = () => {
        if(wishlist.length === 0) {
            showToast("Избранное пусто", "#9AA4BF");
        } else {
            const names = wishlist.map(id => products.find(p => p.id === id)?.name).join(', ');
            showToast(`❤️ ${names}`, "#6C63FF");
        }
    };

    // ========== ЗАПУСК ==========
    renderCategories();
    fetchRubRate();
    updateCartCount();
    updateWishlistCount();
</script>
</body>
</html>
